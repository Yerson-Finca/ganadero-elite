<!-- BeforeInstallPrompt -->
<script>
var deferredPrompt;
window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar botón de instalar después de 10 segundos
    setTimeout(function() {
        if (deferredPrompt) {
            var installBtn = document.createElement('button');
            installBtn.className = 'btn btn-gold';
            installBtn.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:300;width:auto;padding:12px 24px;animation:slideDown 0.5s ease;';
            installBtn.innerHTML = '<i class="fa-solid fa-download"></i> INSTALAR APP';
            installBtn.onclick = function() {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') installBtn.remove();
                    deferredPrompt = null;
                });
            };
            document.body.appendChild(installBtn);
        }
    }, 10000);
});

window.addEventListener('appinstalled', function() {
    deferredPrompt = null;
    console.log('PWA instalada');
});
</script>
